name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Two-matrix CI: arneson-alone and arneson-with-gygax.
# Per PRD G-4 (standalone viability) and G-5 (composition amplification).
# Standalone mode is FIRST-CLASS, not supplementary. Every PR must pass both.

jobs:

  # ----------------------------------------------------------------------------
  # arneson-alone: Gygax is NOT installed. Verifies standalone viability (G-4).
  # ----------------------------------------------------------------------------
  arneson-alone:
    name: "arneson-alone (standalone)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install yq (v4+)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: HEKATE audit (zero-tolerance grep)
        run: ./scripts/ci/hekate-audit.sh

      - name: Validate construct manifest
        run: ./scripts/ci/validate-construct.sh

      - name: Validate all schemas
        run: ./scripts/ci/validate-schemas.sh

      - name: Validate fallback archetype bundle
        run: ./scripts/ci/validate-fallbacks.sh

      - name: Validate synthetic fixture
        run: ./scripts/ci/validate-fixture.sh

      - name: Verify Gygax paths are NOT present (standalone mode sanity)
        run: |
          # In arneson-alone mode, grimoires/gygax/ should not exist.
          if [ -d "grimoires/gygax" ]; then
            echo "FAIL: grimoires/gygax/ present in arneson-alone CI mode"
            exit 1
          fi
          echo "OK: no Gygax paths present (standalone mode confirmed)"

      - name: "Sprint 1 scaffold smoke test (skills stub)"
        run: |
          # Sprint 1 scaffold verification. Full skill execution arrives in Sprint 2+.
          echo "Sprint 1 Foundation: schemas + identity + fallback + fixture present."
          test -f construct.yaml
          test -f identity/ARNESON.md
          test -f schemas/experiential_intent.schema.yaml
          test -d resources/archetypes-fallback
          test -f examples/synthetic-fixture/game-state.yaml
          echo "All foundation artifacts present."

  # ----------------------------------------------------------------------------
  # arneson-with-gygax: Gygax v3 present. Verifies composition amplification (G-5).
  # ----------------------------------------------------------------------------
  arneson-with-gygax:
    name: "arneson-with-gygax (composed)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install yq (v4+)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: HEKATE audit (zero-tolerance grep)
        run: ./scripts/ci/hekate-audit.sh

      - name: Set up stub Gygax fixture
        run: |
          # Sprint 1: stub Gygax paths so composition-detection probes succeed.
          # Sprint 7 will replace this with a real Gygax v3 installation.
          mkdir -p grimoires/gygax/game-state
          touch grimoires/gygax/game-state/.gitkeep
          mkdir -p identity-gygax-stub
          cat > identity-gygax-stub/README.md << 'MARKER'
          Sprint 1 stub. Replaced by real Gygax v3 install in Sprint 7.
          MARKER
          echo "Stub Gygax fixture in place for composition-mode CI."

      - name: Validate construct manifest
        run: ./scripts/ci/validate-construct.sh

      - name: Validate all schemas
        run: ./scripts/ci/validate-schemas.sh

      - name: Verify composition-detection probe finds stub
        run: |
          if [ -d "grimoires/gygax/game-state" ]; then
            echo "OK: composition probe target present (grimoires/gygax/game-state/)"
          else
            echo "FAIL: composition probe target missing"
            exit 1
          fi

      - name: "Sprint 1 composition scaffold smoke test"
        run: |
          # Real composition round-trip (Sprint 3 G-1 test) gets wired in Sprint 3.
          echo "Sprint 1: composition-mode scaffold — probes resolve; full round-trip arrives in Sprint 3."
