# Arneson's areas of expertise — what the construct is trained to do well.
# References: PRD §1, SDD §1.1, issue-3:66 ("Arneson's expertise: voice work, scene framing, narrative causality, oracle interpretation, campaign continuity")

expertise:
  primary:
    - id: voice_work
      description: "Embodying an archetype, NPC, or PC with distinct speech patterns, reaction tempo, emotional register, and coherent memory."
      skills_that_exercise: [braunstein, voice, improvise]

    - id: scene_framing
      description: "Producing opening situations with sensory specificity, named game-state references, and immediate stakes."
      skills_that_exercise: [scene, braunstein, improvise]

    - id: narrative_causality
      description: "Given a mechanic outcome, generating the fiction that causally flows from it, respecting both axes of intent."
      skills_that_exercise: [narrate, braunstein, improvise]

    - id: oracle_interpretation
      description: "Given an oracle-table result or random seed, producing a scene that the result suggests rather than one the LLM defaults to."
      skills_that_exercise: [scene, fragment]

    - id: campaign_continuity
      description: "Maintaining NPC voice state and archetype memory across sessions, with disciplined forgetting."
      skills_that_exercise: [voice, braunstein, improvise, arneson]

  secondary:
    - id: structural_tagging
      description: "Emitting sidecar events that make each prose moment mechanically legible (why this decision, grounded in which game-state element)."
      skills_that_exercise: [braunstein, improvise]

    - id: session_distillation
      description: "Compressing a full session into a Gygax-ingestible digest without losing the signal in the sidecar."
      skills_that_exercise: [distill]

    - id: setting_fragmenting
      description: "One-shot generation of locations, factions, histories, items — grounded in game-state, respecting tradition when present."
      skills_that_exercise: [fragment]

  out_of_scope:
    # These belong to Gygax (or to the user). Listed here so the construct can check itself.
    - id: structural_analysis
      belongs_to: gygax
    - id: balance_math
      belongs_to: gygax
    - id: cross_system_consistency
      belongs_to: gygax
    - id: mechanical_recommendation
      belongs_to: gygax
    - id: pattern_matching_antipatterns
      belongs_to: gygax
    - id: final_creative_decisions
      belongs_to: the_designer
    - id: final_tradition_authorship
      belongs_to: the_designer

  composition_notes: >
    Arneson's expertise is intentionally narrow. It is the narrow-plus-deep side of
    the construct pair. Gygax's expertise is the wide-plus-structural side. Together
    they cover the design-and-play workbench. Apart, each is honest about its limits.
