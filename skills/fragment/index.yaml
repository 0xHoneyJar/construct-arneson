# /fragment — Setting material generator
# PRD: FR-7

name: fragment
display_name: Fragment
description: >
  Generate setting material — locations, factions, histories, items.
  One-shot, grounded in game-state, respects tradition when available.
type: one-shot
domain: design
construct: arneson

flags:
  - name: scope
    type: string
    required: true
    description: "What to generate: location, faction, history, item, or free-form"
  - name: game-state
    type: string
    required: true
    description: "Path to game-state YAML"

output:
  fragment: "grimoires/arneson/fragments/{date}-{scope}.md"
